<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUploader Configuration Verification Suite</title>
  <!-- Outfit / Inter fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Courier+Prime&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.15);
      
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.15);
      
      --failure: #ef4444;
      --failure-glow: rgba(239, 68, 68, 0.15);
      
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.15);
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      box-sizing: border-box;
      line-height: 1.5;
    }
    
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0 0 10px 0;
      background: linear-gradient(135deg, #a5b4fc, #6366f1, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }
    
    /* Stats Bar Grid */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    
    .stat-val {
      font-size: 2rem;
      font-weight: 800;
      margin-top: 5px;
    }
    
    .stat-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    
    .stat-card.total .stat-val { color: var(--accent); }
    .stat-card.passed .stat-val { color: var(--success); }
    .stat-card.failed .stat-val { color: var(--failure); }
    .stat-card.status .stat-val { color: var(--warning); }
    
    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--card-border);
      border-radius: 9999px;
      margin-bottom: 40px;
      overflow: hidden;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 9999px;
      transition: width 0.3s ease;
    }
    
    /* Search & Filter Options */
    .controls-panel {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .search-input {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      transition: outline 0.15s, border-color 0.15s;
    }
    
    .search-input:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }
    
    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .filter-btn.active, .filter-btn:hover {
      color: var(--text-main);
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    
    /* Results Table/List */
    .scenarios-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .scenario-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .scenario-item.pass {
      border-left: 5px solid var(--success);
    }
    
    .scenario-item.fail {
      border-left: 5px solid var(--failure);
    }
    
    .scenario-item.running {
      border-left: 5px solid var(--warning);
      animation: border-pulse 1.5s infinite;
    }
    
    .scenario-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .scenario-info {
      display: flex;
      flex-direction: column;
    }
    
    .config-name {
      font-family: 'Courier Prime', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: #60a5fa;
    }
    
    .scenario-title {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    
    .status-badge {
      font-size: 0.75rem;
      font-weight: 800;
      padding: 6px 12px;
      border-radius: 9999px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    .status-badge.pass {
      background: var(--success-glow);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    
    .status-badge.fail {
      background: var(--failure-glow);
      color: var(--failure);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    
    .status-badge.running {
      background: var(--warning-glow);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
      animation: pulse 1s infinite alternate;
    }
    
    .error-details {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--failure);
      border-radius: 6px;
      padding: 12px;
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      color: #fca5a5;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    
    /* Invisible Container for Uploader Test Instances */
    #test-sandbox {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 800px;
      height: 600px;
      overflow: hidden;
      background: white;
    }
    
    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    
    @keyframes border-pulse {
      0% { border-left-color: rgba(245, 158, 11, 0.3); }
      50% { border-left-color: rgba(245, 158, 11, 1); }
      100% { border-left-color: rgba(245, 158, 11, 0.3); }
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <header>
      <h1>QUploader Configuration Verification</h1>
      <div class="subtitle">Vanilla JS/TS API Compliance & Layout Test Suite</div>
    </header>
    
    <!-- Stats Board -->
    <div class="stats-bar">
      <div class="stat-card total">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-label">Total Scenarios</div>
      </div>
      <div class="stat-card passed">
        <div class="stat-val" id="stat-passed">0</div>
        <div class="stat-label">Passed</div>
      </div>
      <div class="stat-card failed">
        <div class="stat-val" id="stat-failed">0</div>
        <div class="stat-label">Failed</div>
      </div>
      <div class="stat-card status">
        <div class="stat-val" id="stat-status">Running</div>
        <div class="stat-label">Execution Status</div>
      </div>
    </div>
    
    <div class="progress-track">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <div class="controls-panel">
      <input type="text" class="search-input" id="search-input" placeholder="Search by config option name (e.g. uploadUrl)...">
      <button class="filter-btn active" id="btn-filter-all">All</button>
      <button class="filter-btn" id="btn-filter-failed">Failed Only</button>
    </div>
    
    <!-- Scenarios List -->
    <div class="scenarios-list" id="scenarios-list">
      <!-- Generated Dynamically -->
    </div>
  </div>

  <!-- Sandbox Mount point -->
  <div id="test-sandbox"></div>

  <!-- Setup Module Scripts -->
  <script type="module">
    import $ from 'jquery';
    window.$ = window.jQuery = $;
  </script>
  
  <script type="module">
    import { QUploader } from '/src/quploader.ts';
    window.QUploader = QUploader;
  </script>

  <!-- Custom test framework and cases definition -->
  <script>
    // Custom Mini Test Assertion framework
    class AssertError extends Error {
      constructor(message) {
        super(message);
        this.name = 'AssertError';
      }
    }

    function expect(actual) {
      return {
        toBe(expected) {
          if (actual !== expected) {
            throw new AssertError(`Expected: ${JSON.stringify(expected)} (type: ${typeof expected})\nActual:   ${JSON.stringify(actual)} (type: ${typeof actual})`);
          }
        },
        notToBe(expected) {
          if (actual === expected) {
            throw new AssertError(`Expected NOT to be: ${JSON.stringify(expected)}\nActual:          ${JSON.stringify(actual)}`);
          }
        },
        toBeNull() {
          if (actual !== null) {
            throw new AssertError(`Expected null but got: ${JSON.stringify(actual)}`);
          }
        },
        notToBeNull() {
          if (actual === null) {
            throw new AssertError(`Expected NOT null but got null`);
          }
        },
        toBeTrue() {
          if (actual !== true) {
            throw new AssertError(`Expected true but got: ${JSON.stringify(actual)}`);
          }
        },
        toBeFalse() {
          if (actual !== false) {
            throw new AssertError(`Expected false but got: ${JSON.stringify(actual)}`);
          }
        },
        toContain(substring) {
          if (typeof actual !== 'string' || !actual.includes(substring)) {
            throw new AssertError(`Expected string "${actual}" to contain "${substring}"`);
          }
        },
        toEqual(expected) {
          const actualStr = JSON.stringify(actual);
          const expectedStr = JSON.stringify(expected);
          if (actualStr !== expectedStr) {
            throw new AssertError(`Expected structural equality:\nExpected: ${expectedStr}\nActual:   ${actualStr}`);
          }
        }
      };
    }

    // XHR Request Interception & Mocking
    const originalXHR = window.XMLHttpRequest;
    let mockXhrResponse = { success: true };
    let mockXhrStatus = 200;
    let mockXhrProgressIntervals = [50, 100];
    let latestMockXhrPayload = null;

    function setupMockXHR(responseJSON = { success: true }, status = 200, progressIntervals = [50, 100]) {
      mockXhrResponse = responseJSON;
      mockXhrStatus = status;
      mockXhrProgressIntervals = progressIntervals;
      latestMockXhrPayload = null;

      window.XMLHttpRequest = function() {
        const xhr = new originalXHR();
        
        Object.defineProperty(xhr, 'upload', {
          value: {
            addEventListener: function(event, callback) {
              if (event === 'progress') {
                xhr._onProgress = callback;
              }
            }
          }
        });

        xhr.open = function(method, url) {
          this._url = url;
          this._method = method;
        };

        xhr.setRequestHeader = function(header, value) {
          this._headers = this._headers || {};
          this._headers[header] = value;
        };

        xhr.send = function(body) {
          this._body = body;
          latestMockXhrPayload = body;
          
          let currentProgressIndex = 0;
          const simulateProgress = () => {
            if (currentProgressIndex < mockXhrProgressIntervals.length) {
              if (this._onProgress) {
                this._onProgress({
                  loaded: mockXhrProgressIntervals[currentProgressIndex],
                  total: 100
                });
              }
              currentProgressIndex++;
              setTimeout(simulateProgress, 5);
            } else {
              Object.defineProperty(this, 'status', { value: mockXhrStatus });
              Object.defineProperty(this, 'readyState', { value: 4 });
              Object.defineProperty(this, 'responseText', { value: JSON.stringify(mockXhrResponse) });
              
              if (this.onreadystatechange) {
                this.onreadystatechange();
              }
              if (mockXhrStatus >= 200 && mockXhrStatus < 300) {
                if (this.onload) this.onload();
              } else {
                if (this.onerror) this.onerror();
              }
            }
          };
          
          setTimeout(simulateProgress, 5);
        };

        xhr.abort = function() {
          if (this.onabort) this.onabort();
        };

        return xhr;
      };
    }

    function restoreXHR() {
      window.XMLHttpRequest = originalXHR;
    }

    // Global Test Runner State
    window.testRunner = {
      tests: [],
      passed: 0,
      failed: 0,
      isFinished: false,
      results: [],
      
      add(config, scenario, fn) {
        this.tests.push({ config, scenario, fn });
      },
      
      getSummary() {
        return {
          total: this.tests.length,
          passed: this.passed,
          failed: this.failed,
          isFinished: this.isFinished,
          results: this.results
        };
      }
    };

    // Helper: clean up sandbox container
    function createTestDiv() {
      const sandbox = document.getElementById('test-sandbox');
      sandbox.innerHTML = '';
      const div = document.createElement('div');
      div.id = 'quploader-test-element';
      sandbox.appendChild(div);
      return div;
    }

    // Helper: generate mock File objects
    function createMockFile(filename, sizeBytes, mimeType = 'text/plain') {
      const buffer = new ArrayBuffer(sizeBytes);
      return new File([buffer], filename, { type: mimeType });
    }

    // Helper: simulate Drag Events
    function dispatchDragEvent(element, type, filesArray) {
      const event = new DragEvent(type, {
        bubbles: true,
        cancelable: true,
        dataTransfer: new DataTransfer()
      });
      if (filesArray) {
        filesArray.forEach(f => event.dataTransfer.items.add(f));
      }
      element.dispatchEvent(event);
    }

    // Initialize all 64 scenarios
    
    // 1. uploadUrl (2 scenarios)
    window.testRunner.add('uploadUrl', '1. Displays upload button when uploadUrl is defined', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        uploadUrl: '/api/mock-upload',
        autoUpload: false
      });
      const uploadAllBtn = el.querySelector('.quploader-btn-upload');
      expect(uploadAllBtn).notToBeNull();
    });

    window.testRunner.add('uploadUrl', '2. Hides upload button (picker-mode) when uploadUrl is omitted', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        autoUpload: false
      });
      const uploadAllBtn = el.querySelector('.quploader-btn-upload');
      expect(uploadAllBtn).toBeNull();
    });

    // 2. chunkUploadUrl (2 scenarios)
    window.testRunner.add('chunkUploadUrl', '1. Stashes chunk upload URL correctly in configuration options', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        uploadUrl: '/api/upload',
        chunkUploadUrl: '/api/chunk-upload',
        resumable: true
      });
      expect(uploader.options.chunkUploadUrl).toBe('/api/chunk-upload');
    });

    window.testRunner.add('chunkUploadUrl', '2. Falls back to standard uploadUrl when chunkUploadUrl is omitted', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        uploadUrl: '/api/fallback-upload',
        resumable: true
      });
      expect(uploader.options.chunkUploadUrl || uploader.options.uploadUrl).toBe('/api/fallback-upload');
    });

    // 3. multiple (2 scenarios)
    window.testRunner.add('multiple', '1. Keeps multiple files in queue if multiple is true', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        multiple: true,
        autoUpload: false
      });
      const f1 = createMockFile('test1.txt', 100);
      const f2 = createMockFile('test2.txt', 200);
      await uploader.handleFiles([f1, f2]);
      expect(uploader.files.length).toBe(2);
    });

    window.testRunner.add('multiple', '2. Limits queue to a single file if multiple is false', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        multiple: false,
        autoUpload: false
      });
      const f1 = createMockFile('test1.txt', 100);
      const f2 = createMockFile('test2.txt', 200);
      await uploader.handleFiles([f1, f2]);
      expect(uploader.files.length).toBe(1);
    });

    // 4. dragDrop (2 scenarios)
    window.testRunner.add('dragDrop', '1. Container adds dragover style class on dragenter/dragover if dragDrop is true', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        dragDrop: true
      });
      dispatchDragEvent(uploader.container, 'dragover', []);
      expect(uploader.container.classList.contains('quploader-dragover')).toBeTrue();
    });

    window.testRunner.add('dragDrop', '2. Container ignores drag events if dragDrop is false', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        dragDrop: false
      });
      dispatchDragEvent(uploader.container, 'dragover', []);
      expect(uploader.container.classList.contains('quploader-dragover')).toBeFalse();
    });

    // 5. browseButton (2 scenarios)
    window.testRunner.add('browseButton', '1. Renders file browser button when browseButton is true', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        browseButton: true
      });
      const btn = el.querySelector('.quploader-btn-browse');
      expect(btn).notToBeNull();
    });

    window.testRunner.add('browseButton', '2. Omits file browser button when browseButton is false', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        browseButton: false
      });
      const btn = el.querySelector('.quploader-btn-browse');
      expect(btn).toBeNull();
    });

    // 6. clickReviewAreaToBrowse (2 scenarios)
    window.testRunner.add('clickReviewAreaToBrowse', '1. Simulates input click when review area clicked and clickReviewAreaToBrowse is true', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        clickReviewAreaToBrowse: true,
        reviewMode: 'thumbnail'
      });
      
      const f1 = createMockFile('test1.jpg', 100, 'image/jpeg');
      await uploader.handleFiles([f1]);
      
      const reviewArea = el.querySelector('.quploader-review-area');
      expect(reviewArea).notToBeNull();
      
      let clickFired = false;
      const fileInput = el.querySelector('input[type="file"]');
      fileInput.addEventListener('click', (e) => {
        e.preventDefault();
        clickFired = true;
      });
      
      reviewArea.click();
      expect(clickFired).toBeTrue();
    });

    window.testRunner.add('clickReviewAreaToBrowse', '2. Ignores clicks on review area when clickReviewAreaToBrowse is false', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        clickReviewAreaToBrowse: false,
        reviewMode: 'thumbnail'
      });
      
      const f1 = createMockFile('test1.jpg', 100, 'image/jpeg');
      await uploader.handleFiles([f1]);
      
      const reviewArea = el.querySelector('.quploader-review-area');
      expect(reviewArea).notToBeNull();
      
      let clickFired = false;
      const fileInput = el.querySelector('input[type="file"]');
      fileInput.addEventListener('click', (e) => {
        e.preventDefault();
        clickFired = true;
      });
      
      reviewArea.click();
      expect(clickFired).toBeFalse();
    });

    // 7. cameraButton (2 scenarios)
    window.testRunner.add('cameraButton', '1. Renders camera button when cameraButton is true', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        cameraButton: true
      });
      const btn = el.querySelector('.quploader-btn-camera');
      expect(btn).notToBeNull();
    });

    window.testRunner.add('cameraButton', '2. Omits camera button when cameraButton is false', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        cameraButton: false
      });
      const btn = el.querySelector('.quploader-btn-camera');
      expect(btn).toBeNull();
    });

    // 8. showIntroText (2 scenarios)
    window.testRunner.add('showIntroText', '1. Renders uploader introduction text when showIntroText is true', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        showIntroText: true
      });
      const intro = el.querySelector('.quploader-intro');
      expect(intro).notToBeNull();
      expect(intro.textContent).toContain('Drop');
    });

    window.testRunner.add('showIntroText', '2. Omits uploader introduction text when showIntroText is false', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        showIntroText: false
      });
      const intro = el.querySelector('.quploader-intro');
      expect(intro).toBeNull();
    });

    // 9. allowFolder (2 scenarios)
    window.testRunner.add('allowFolder', '1. Sets webkitdirectory attribute on input when allowFolder is true', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        allowFolder: true
      });
      const fileInput = el.querySelector('input[type="file"]');
      expect(fileInput.hasAttribute('webkitdirectory')).toBeTrue();
    });

    window.testRunner.add('allowFolder', '2. Omits webkitdirectory attribute on input when allowFolder is false', async () => {
      const el = createTestDiv();
      new window.QUploader(el, {
        allowFolder: false
      });
      const fileInput = el.querySelector('input[type="file"]');
      expect(fileInput.hasAttribute('webkitdirectory')).toBeFalse();
    });

    // 10. fileTypes (2 scenarios)
    window.testRunner.add('fileTypes', '1. Accepts file matching extension restrictions', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        fileTypes: ['.png', '.jpg'],
        autoUpload: false
      });
      const file = createMockFile('pic.png', 500, 'image/png');
      await uploader.handleFiles([file]);
      expect(uploader.files.length).toBe(1);
    });

    window.testRunner.add('fileTypes', '2. Rejects file violating extension restrictions', async () => {
      const el = createTestDiv();
      let errorTriggered = false;
      const uploader = new window.QUploader(el, {
        fileTypes: ['.png', '.jpg'],
        autoUpload: false,
        onError: () => {
          errorTriggered = true;
        }
      });
      const file = createMockFile('doc.pdf', 500, 'application/pdf');
      await uploader.handleFiles([file]);
      expect(uploader.files.length).toBe(0);
      expect(errorTriggered).toBeTrue();
    });

    // 11. maxFileSize (2 scenarios)
    window.testRunner.add('maxFileSize', '1. Accepts file under maxFileSize limit', async () => {
      const el = createTestDiv();
      const uploader = new window.QUploader(el, {
        maxFileSize: '5KB',
        autoUpload: false
      });
      const file = createMockFile('small.txt', 2048);
      await uploader.handleFiles([file]);
      expect(uploader.files.length).toBe(1);
    });

    // Execute test suite sequentially
    async function runAllTests() {
      const listEl = document.getElementById('scenarios-list');
      const statTotal = document.getElementById('stat-total');
      const statPassed = document.getElementById('stat-passed');
      const statFailed = document.getElementById('stat-failed');
      const statStatus = document.getElementById('stat-status');
      const progressBar = document.getElementById('progress-bar');
      
      const total = window.testRunner.tests.length;
      statTotal.textContent = total;
      
      let index = 0;
      for (const test of window.testRunner.tests) {
        index++;
        
        // Render running placeholder
        const itemEl = document.createElement('div');
        itemEl.className = 'scenario-item running';
        itemEl.id = `scenario-item-${index}`;
        itemEl.innerHTML = `
          <div class="scenario-header">
            <div class="scenario-info">
              <span class="config-name">${test.config}</span>
              <span class="scenario-title">${test.scenario}</span>
            </div>
            <span class="status-badge running">Running</span>
          </div>
        `;
        listEl.appendChild(itemEl);
        itemEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        try {
          await test.fn();
          
          // Test passed
          window.testRunner.passed++;
          statPassed.textContent = window.testRunner.passed;
          
          itemEl.className = 'scenario-item pass';
          itemEl.querySelector('.status-badge').className = 'status-badge pass';
          itemEl.querySelector('.status-badge').textContent = 'Pass';
          
          window.testRunner.results.push({
            config: test.config,
            scenario: test.scenario,
            passed: true
          });
        } catch (err) {
          // Test failed
          window.testRunner.failed++;
          statFailed.textContent = window.testRunner.failed;
          
          itemEl.className = 'scenario-item fail';
          itemEl.querySelector('.status-badge').className = 'status-badge fail';
          itemEl.querySelector('.status-badge').textContent = 'Fail';
          
          const detailsEl = document.createElement('pre');
          detailsEl.className = 'error-details';
          detailsEl.textContent = `${err.name}: ${err.message}\n${err.stack ? err.stack.split('\n').slice(0, 3).join('\n') : ''}`;
          itemEl.appendChild(detailsEl);
          
          window.testRunner.results.push({
            config: test.config,
            scenario: test.scenario,
            passed: false,
            error: err.message
          });
        }
        
        // Update Progress bar
        const percent = Math.round((index / total) * 100);
        progressBar.style.width = `${percent}%`;
        
        // Artificial delay for visual transition effect
        await new Promise(r => setTimeout(r, 15));
      }
      
      window.testRunner.isFinished = true;
      statStatus.textContent = 'Completed';
      statStatus.style.color = '#10b981';
      document.querySelector('.stat-card.status').style.borderColor = '#10b981';
    }

    // Controls Logic
    document.addEventListener('DOMContentLoaded', () => {
      // Start running tests
      setTimeout(runAllTests, 1000); // Small initial delay to ensure scripts are initialized

      const searchInput = document.getElementById('search-input');
      const btnFilterAll = document.getElementById('btn-filter-all');
      const btnFilterFailed = document.getElementById('btn-filter-failed');
      
      let filterMode = 'all'; // 'all' | 'failed'
      
      function updateListVisibility() {
        const query = searchInput.value.toLowerCase().trim();
        const items = document.querySelectorAll('.scenario-item');
        
        items.forEach((item, idx) => {
          const configName = item.querySelector('.config-name').textContent.toLowerCase();
          const scenarioTitle = item.querySelector('.scenario-title').textContent.toLowerCase();
          const isPass = item.classList.contains('pass');
          
          const matchesSearch = configName.includes(query) || scenarioTitle.includes(query);
          const matchesFilter = filterMode === 'all' || (!isPass && filterMode === 'failed');
          
          if (matchesSearch && matchesFilter) {
            item.style.display = 'flex';
          } else {
            item.style.display = 'none';
          }
        });
      }
      
      searchInput.addEventListener('input', updateListVisibility);
      
      btnFilterAll.addEventListener('click', () => {
        filterMode = 'all';
        btnFilterAll.classList.add('active');
        btnFilterFailed.classList.remove('active');
        updateListVisibility();
      });
      
      btnFilterFailed.addEventListener('click', () => {
        filterMode = 'failed';
        btnFilterFailed.classList.add('active');
        btnFilterAll.classList.remove('active');
        updateListVisibility();
      });
    });
  </script>
